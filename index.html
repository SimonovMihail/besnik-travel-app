<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="./styles/style.css">
        <title>Dream Travel Agency</title>
    </head>
    <body>
        <section class="slogan-block">
            <header class="slogan-header-block">
                <nav class="slogan-header-block__nav-block">
                    <div class="nav-logo">
                        <img src="images/logo.png" alt="logo">
                    </div>
                    <div class="nav-info-block">
                        <a href="/">find a trip</a>
                        <a href="/"> destinations</a>
                        <a href="/">why besnik</a>
                        <a href="/">contact</a>
                    </div>
                    <div class="nav-button-block">

                    </div>
                </nav>
            </header>
            <main class="slogan-main-block">
                <h1 class="slogan-main-block__main-words">Exploring The World In Comfort</h1>
                <h2 class="slogan-main-block__sub-words">You do not have the right to remain silent... let us know what it takes to challenge you</h2>
                <div class="slogan-search-tab">
                    <div class="slogan-search-tab__search"> <!-- todo: займись стилями этой секции-->

                            <input id="search" type="text">
                        </label>
                    </div>

                </div>

        <section class="information-block"></section>
        <footer class="bottom-info-block"></footer>
