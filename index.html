<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <link rel="stylesheet" href="./styles/style.css">
        <title>Dream Travel Agency</title>
    </head>
    <body>
        <section class="slogan-block">
            <header class="slogan-header-block">
                <nav class="slogan-header-block__nav-block">
                    <div class="nav-logo">
                        <img class="nav-logo__img" src="images/logo.png" alt="logo">
                    </div>
                    <div class="nav-info-block">
                        <a class="nav-info-block__link" href="/">find a trip</a>
                        <a class="nav-info-block__link" href="/"> destinations</a>
                        <a class="nav-info-block__link" href="/">why besnik</a>
                        <a class="nav-info-block__link" href="/">contact</a>
                    </div>
                    <div class="nav-button-block">
                        <button class="nav-button-block__button" type="button">Create account</button>
                    </div>
                </nav>
            </header>
            <main class="slogan-main-block">
                <h1 class="slogan-main-block__main-words">Exploring The World In Comfort</h1>
                <h2 class="slogan-main-block__sub-words">You do not have the right to remain silent... let us know what it takes to challenge you</h2>
                <div class="slogan-search-panel">
                    <div class="slogan-search-bar">
                        <svg class="slogan-search-bar__search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">

                        </svg>
                        <svg class="slogan-search-bar__divider" width="1" height="15" viewBox="0 0 1 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="1" height="15" fill="#E5E5E5"/>
                        </svg>
                        <div class="slogan-search-bar__destination-input-wrap">
                            <label for="destination-input">
                                <input placeholder="Search destination" class="slogan-search-destination-input" id="destination-input" type="text">
                            </label>
                        </div>
                        <svg class="slogan-search-bar__bigger-divider" width="1" height="27" viewBox="0 0 1 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="1" height="27" fill="#E6E6E6"/>
                        </svg>
                        <svg class="slogan-search-bar__location-icon" width="13" height="16" viewBox="0 0 13 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M11.7833 2.78191C10.5618 1.01409 8.62597 0 6.47251 0C4.31904 0 2.38319 1.01409 1.16172 2.78191C-0.053745 4.54078 -0.334401 6.76756 0.409474 8.73491C0.608443 9.27216 0.924724 9.79412 1.34729 10.2832L6.0466 15.8031C6.15288 15.928 6.3086 16 6.47251 16C6.63641 16 6.79213 15.928 6.89841 15.8031L11.5964 10.2847C12.0208 9.79281 12.3367 9.27141 12.534 8.73847C13.2794 6.76756 12.9988 4.54078 11.7833 2.78191ZM11.4864 8.34666C11.3343 8.75784 11.0858 9.16438 10.7485 9.55541C10.7476 9.55634 10.7466 9.55728 10.7459 9.55841L6.47251 14.5777L2.19651 9.55525C1.85935 9.16456 1.61094 8.75806 1.45729 8.34294C0.842099 6.71591 1.07557 4.87478 2.08201 3.41819C3.0916 1.95694 4.69197 1.11888 6.47251 1.11888C8.25301 1.11888 9.85319 1.95691 10.8628 3.41819C11.8694 4.87478 12.1031 6.71591 11.4864 8.34666Z" fill="#AFAEB4"/>
                            <path d="M6.4729 3.31934C4.74553 3.31934 3.34003 4.72465 3.34003 6.45221C3.34003 8.17977 4.74534 9.58509 6.4729 9.58509C8.20046 9.58509 9.60578 8.17977 9.60578 6.45221C9.60578 4.72484 8.20028 3.31934 6.4729 3.31934ZM6.4729 8.46618C5.3624 8.46618 4.4589 7.56268 4.4589 6.45218C4.4589 5.34168 5.3624 4.43818 6.4729 4.43818C7.5834 4.43818 8.4869 5.34168 8.4869 6.45218C8.4869 7.56268 7.5834 8.46618 6.4729 8.46618Z" fill="#AFAEB4"/>
                        </svg>
                        <div class="slogan-search-bar__location-input-wrap">
                            <label for="location-input">
                                <input placeholder="C. Location" class="slogan-search-location-input" id="location-input" type="text">
                            </label>
                        </div>
                        <svg class="slogan-search-bar__bigger-divider" width="1" height="27" viewBox="0 0 1 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="1" height="27" fill="#E6E6E6"/>
                        </svg>
                        <div class="slogan-search-bar__people-dropdown-menu">
                            <button class="slogan-people-dropdown-button">2 Person</button>
                            <svg class="slogan-down-arrow-icon" width="9" height="9" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0 2.25L4.50002 6.75002L9 2.25H0Z" fill="#BCBCBC"/>
                            </svg>
                        </div>
                    </div>
                    <button class="slogan-search-panel__search-button" type="button">Search</button>
                </div>
            </main>
        </section>
        <section class="information-block"></section>
        <footer class="bottom-info-block"></footer>
    </body>
</html>
